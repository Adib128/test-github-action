name: My First Action
on: [push]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Get my code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: Check Node version
        run: node -v


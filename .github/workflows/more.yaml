name: My First Action

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    environment: production 

    steps:
      - name: 1. Get my code
        uses: actions/checkout@v4

      - name: 2. Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 24
          cache: 'npm'

      - name: 3. Install and Test
        run: |
              npm ci
              npm test --if-present
              echo "Building $PROJECT_NAME"
              echo "Mode is $BUILD_MODE"
              echo ${{ github.repository }}
              if [ -z "${{ secrets.ENV_SECRET }}" ]; then
              echo "❌ Secret is EMPTY"
              else
                echo "✅ Secret is LOADED (GitHub is masking it)"
              fi
              echo repo var: ${{vars.REPO_VARIABLE}}


name: My First Action

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: 24
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci

  # JOB 2: Test
  test:
    runs-on: ubuntu-latest
    needs: build # Wait for build to finish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: 24
          cache: 'npm'
      - name: Install dep
        run: npm ci
            
      - name: Run Tests
        run: npm test --if-present
        

  # JOB 3: Deploy (What you called 'Run')
  deploy:
    runs-on: ubuntu-latest
    needs: test # Wait for test to finish
    environment: production 
    steps:
      - name: Trigger Render
        run: |
          echo "Deploying ${{ github.repository }}..."
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "❌ No Deploy Hook Found"
          else
            curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "✅ Render deployment triggered!"
          fi
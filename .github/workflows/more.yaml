name: Professional Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present

  deploy-staging:
    name: Deploy to Test Server
    runs-on: ubuntu-latest
    needs: test
    environment: staging  # Uses staging secrets/vars
    steps:
      - name: Trigger Staging Deploy
        run: |
          echo "🚀 Deploying to STAGING server..."
          # You would use a STAGING_DEPLOY_HOOK secret here
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

  deploy-production:
    name: Deploy to Live Server
    runs-on: ubuntu-latest
    needs: deploy-staging # Only runs after staging is finished
    environment: production # This triggers the "Manual Approval" pop-up!
    steps:
      - name: Trigger Production Deploy
        run: |
          echo "🌎 Deploying to PRODUCTION server..."
          curl -X GET "${{ secrets.RENDER_DEPLOY_HOOK }}"